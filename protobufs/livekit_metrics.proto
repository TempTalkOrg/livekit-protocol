syntax = "proto3";

package livekit;
option go_package = "github.com/livekit/protocol/livekit";
option csharp_namespace = "LiveKit.Proto";
option ruby_package = "LiveKit::Proto";

import "google/protobuf/timestamp.proto";


/*
  Protocol used to record metrics for a specific session.

  Clients send their timestamp in their own monotonically increasing time (e.g `performance.now` on JS).
  These timestamps are then augmented by the SFU to its time base.

  A metric can be linked to a specific track by setting `track_sid`.
*/


// index from [0: MAX_LABEL_PREDEFINED_MAX_VALUE) are for predefined labels (`MetricLabel`)
enum MetricLabel {
  AGENTS_LLM_TTFT = 0; // time to first token from LLM
  AGENTS_STT_TTFT = 1; // time to final transcription
  AGENTS_TTS_TTFB = 2; // time to first byte

  CLIENT_VIDEO_SUBSCRIBER_FREEZE_COUNT = 3;                           // Number of video freezes
  CLIENT_VIDEO_SUBSCRIBER_TOTAL_FREEZE_DURATION = 4;                  // total duration of freezes
  CLIENT_VIDEO_SUBSCRIBER_PAUSE_COUNT = 5;                            // number of video pauses
  CLIENT_VIDEO_SUBSCRIBER_TOTAL_PAUSES_DURATION = 6;                  // total duration of pauses
  CLIENT_AUDIO_SUBSCRIBER_CONCEALED_SAMPLES = 7;                      // number of concealed (synthesized) audio samples
  CLIENT_AUDIO_SUBSCRIBER_SILENT_CONCEALED_SAMPLES = 8;               // number of silent concealed samples
  CLIENT_AUDIO_SUBSCRIBER_CONCEALMENT_EVENTS = 9;                     // number of concealment events
  CLIENT_AUDIO_SUBSCRIBER_INTERRUPTION_COUNT = 10;                    // number of interruptions
  CLIENT_AUDIO_SUBSCRIBER_TOTAL_INTERRUPTION_DURATION = 11;           // total duration of interruptions
  CLIENT_SUBSCRIBER_JITTER_BUFFER_DELAY = 12;                         // total time spent in jitter buffer
  CLIENT_SUBSCRIBER_JITTER_BUFFER_EMITTED_COUNT = 13;                 // total time spent in jitter buffer
  CLIENT_VIDEO_PUBLISHER_QUALITY_LIMITATION_DURATION_BANDWIDTH = 14;  // total duration spent in bandwidth quality limitation
  CLIENT_VIDEO_PUBLISHER_QUALITY_LIMITATION_DURATION_CPU = 15;        // total duration spent in cpu quality limitation
  CLIENT_VIDEO_PUBLISHER_QUALITY_LIMITATION_DURATION_OTHER = 16;      // total duration spent in other quality limitation

  PUBLISHER_RTT = 17;   // Publisher RTT (participant -> server)
  SERVER_MESH_RTT = 18; // RTT between publisher node and subscriber node (could involve intermedia node(s))
  SUBSCRIBER_RTT = 19;  // Subscribe RTT (server -> participant)

  CLIENT_VIDEO_SUBSCRIBER_PACKETS_RECEIVED = 20;                      // inbound video RTP packets received
  CLIENT_VIDEO_SUBSCRIBER_BYTES_RECEIVED = 21;                        // inbound video RTP bytes received
  CLIENT_VIDEO_SUBSCRIBER_PACKETS_LOST = 22;                          // inbound video RTP packets lost
  CLIENT_VIDEO_SUBSCRIBER_JITTER = 23;                                // inbound video RTP jitter
  CLIENT_VIDEO_SUBSCRIBER_FRAMES_RECEIVED = 24;                       // inbound video frames received
  CLIENT_VIDEO_SUBSCRIBER_FRAMES_DECODED = 25;                        // inbound video frames decoded
  CLIENT_VIDEO_SUBSCRIBER_KEY_FRAMES_DECODED = 26;                    // inbound video key frames decoded
  CLIENT_VIDEO_SUBSCRIBER_FRAMES_DROPPED = 27;                        // inbound video frames dropped
  CLIENT_VIDEO_SUBSCRIBER_FRAME_WIDTH = 28;                           // inbound video frame width
  CLIENT_VIDEO_SUBSCRIBER_FRAME_HEIGHT = 29;                          // inbound video frame height
  CLIENT_VIDEO_SUBSCRIBER_FRAMES_PER_SECOND = 30;                     // inbound video frames per second
  CLIENT_VIDEO_SUBSCRIBER_JITTER_BUFFER_TARGET_DELAY = 31;            // inbound video jitter buffer target delay
  CLIENT_VIDEO_SUBSCRIBER_JITTER_BUFFER_MINIMUM_DELAY = 32;           // inbound video jitter buffer minimum delay
  CLIENT_VIDEO_SUBSCRIBER_TOTAL_DECODE_TIME = 33;                     // inbound video total decode time
  CLIENT_VIDEO_SUBSCRIBER_TOTAL_PROCESSING_DELAY = 34;                // inbound video total processing delay
  CLIENT_VIDEO_SUBSCRIBER_TOTAL_ASSEMBLY_TIME = 35;                   // inbound video total frame assembly time
  CLIENT_VIDEO_SUBSCRIBER_PLI_COUNT = 36;                             // inbound video PLI count
  CLIENT_VIDEO_SUBSCRIBER_FIR_COUNT = 37;                             // inbound video FIR count
  CLIENT_VIDEO_SUBSCRIBER_NACK_COUNT = 38;                            // inbound video NACK count
  CLIENT_SUBSCRIBER_CURRENT_ROUND_TRIP_TIME = 39;                     // selected candidate pair current RTT
  CLIENT_SUBSCRIBER_AVAILABLE_INCOMING_BITRATE = 40;                  // selected candidate pair available incoming bitrate

  CLIENT_VIDEO_PUBLISHER_PACKETS_SENT = 41;                           // outbound video RTP packets sent
  CLIENT_VIDEO_PUBLISHER_BYTES_SENT = 42;                             // outbound video RTP bytes sent
  CLIENT_VIDEO_PUBLISHER_RETRANSMITTED_PACKETS_SENT = 43;             // outbound video retransmitted packets sent
  CLIENT_VIDEO_PUBLISHER_RETRANSMITTED_BYTES_SENT = 44;               // outbound video retransmitted bytes sent
  CLIENT_VIDEO_PUBLISHER_TARGET_BITRATE = 45;                         // outbound video target bitrate
  CLIENT_VIDEO_PUBLISHER_FRAMES_ENCODED = 46;                         // outbound video frames encoded
  CLIENT_VIDEO_PUBLISHER_KEY_FRAMES_ENCODED = 47;                     // outbound video key frames encoded
  CLIENT_VIDEO_PUBLISHER_FRAMES_SENT = 48;                            // outbound video frames sent
  CLIENT_VIDEO_PUBLISHER_HUGE_FRAMES_SENT = 49;                       // outbound video huge frames sent
  CLIENT_VIDEO_PUBLISHER_FRAME_WIDTH = 50;                            // outbound video frame width
  CLIENT_VIDEO_PUBLISHER_FRAME_HEIGHT = 51;                           // outbound video frame height
  CLIENT_VIDEO_PUBLISHER_FRAMES_PER_SECOND = 52;                      // outbound video frames per second
  CLIENT_VIDEO_PUBLISHER_TOTAL_ENCODE_TIME = 53;                      // outbound video total encode time
  CLIENT_VIDEO_PUBLISHER_TOTAL_PACKET_SEND_DELAY = 54;                // outbound video total packet send delay
  CLIENT_VIDEO_PUBLISHER_PLI_COUNT = 55;                              // outbound video PLI count
  CLIENT_VIDEO_PUBLISHER_FIR_COUNT = 56;                              // outbound video FIR count
  CLIENT_VIDEO_PUBLISHER_NACK_COUNT = 57;                             // outbound video NACK count
  CLIENT_VIDEO_PUBLISHER_QP_SUM = 58;                                 // outbound video QP sum
  CLIENT_VIDEO_PUBLISHER_QUALITY_LIMITATION_RESOLUTION_CHANGES = 59;  // outbound video quality limitation resolution changes

  CLIENT_AUDIO_PUBLISHER_PACKETS_SENT = 60;                           // outbound audio RTP packets sent
  CLIENT_AUDIO_PUBLISHER_BYTES_SENT = 61;                             // outbound audio RTP bytes sent
  CLIENT_AUDIO_PUBLISHER_RETRANSMITTED_PACKETS_SENT = 62;             // outbound audio retransmitted packets sent
  CLIENT_AUDIO_PUBLISHER_RETRANSMITTED_BYTES_SENT = 63;               // outbound audio retransmitted bytes sent
  CLIENT_AUDIO_PUBLISHER_TARGET_BITRATE = 64;                         // outbound audio target bitrate
  CLIENT_AUDIO_PUBLISHER_TOTAL_PACKET_SEND_DELAY = 65;                // outbound audio total packet send delay

  CLIENT_PUBLISHER_STREAM_RTT = 66;                                    // outbound RTP stream RTT from remote-inbound-rtp
  CLIENT_SUBSCRIBER_STREAM_RTT = 67;                                   // inbound RTP stream RTT from remote-outbound-rtp

  METRIC_LABEL_PREDEFINED_MAX_VALUE = 4096;
}

message MetricsBatch {
  int64 timestamp_ms = 1; // time at which this batch is sent based on a monotonic clock (millisecond resolution)
  google.protobuf.Timestamp normalized_timestamp = 2;
  // To avoid repeating string values, we store them in a separate list and reference them by index
  // This is useful for storing participant identities, track names, etc.
  // There is also a predefined list of labels that can be used to reference common metrics.
  // They have reserved indices from 0 to (METRIC_LABEL_PREDEFINED_MAX_VALUE - 1).
  // Indexes pointing at str_data should start from METRIC_LABEL_PREDEFINED_MAX_VALUE,
  // such that str_data[0] == index of METRIC_LABEL_PREDEFINED_MAX_VALUE.
  repeated string str_data = 3;
  repeated TimeSeriesMetric time_series = 4;
  repeated EventMetric events = 5;
}

message TimeSeriesMetric {
  // Metric name e.g "speech_probablity". The string value is not directly stored in the message, but referenced by index
  // in the `str_data` field of `MetricsBatch`
  uint32 label = 1;
  uint32 participant_identity = 2; // index into `str_data`
  uint32 track_sid = 3; // index into `str_data`
  repeated MetricSample samples = 4;
  uint32 rid = 5; // index into 'str_data'
}

message MetricSample {
  int64 timestamp_ms = 1; // time of metric based on a monotonic clock (in milliseconds)
  google.protobuf.Timestamp normalized_timestamp = 2;
  float value = 3;
}

message EventMetric {
  uint32 label = 1;
  uint32 participant_identity = 2; // index into `str_data`
  uint32 track_sid = 3; // index into `str_data`
  int64 start_timestamp_ms = 4; // start time of event based on a monotonic clock (in milliseconds)
  optional int64 end_timestamp_ms = 5; // end time of event based on a monotonic clock (in milliseconds), if needed
  google.protobuf.Timestamp normalized_start_timestamp = 6;
  optional google.protobuf.Timestamp normalized_end_timestamp = 7;
  string metadata = 8;
  uint32 rid = 9; // index into 'str_data'
}

message MetricsRecordingHeader {
  string room_id = 1;
  optional bool enable_user_data_training = 2;
}
